name: CodeQL

on:
    push:
        branches:
            - main
            - release/**
    pull_request:
    schedule:
        - cron: "0 12 * * *"

permissions:
    security-events: write

jobs:
    analyze:
        name: Analyze (CodeQL)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: '17'
                  cache: maven

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: java-kotlin
                  build-mode: manual

            - name: Build core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B -ntp clean install -Dmaven.test.skip=true

            - name: Build spring-boot-starter
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: mvn -B -ntp clean verify -Dmaven.test.skip=true

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
