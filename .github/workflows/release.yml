name: Release
on:
    workflow_dispatch:
        inputs:
            version:
                required: true
                description: "Release version (example: 0.0.3)"
            next-main-version:
                required: true
                description: "Next main version (example: 0.0.4-SNAPSHOT)"

permissions:
    contents: write
    pull-requests: write
    security-events: write

jobs:
    create-release-branch:
        name: Create Release Branch
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                ref: main

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Create release branch
              run: git checkout -b release/${{ inputs.version }}

            - name: Set core package version
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -ntp versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

            - name: Set starter package version
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: |
                  mvn -ntp versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

                  mvn -ntp versions:use-dep-version \
                  -Dincludes=in.co.akshitbansal:spring-web-query-core \
                  -DdepVersion=${{ inputs.version }} \
                  -DforceVersion=true -DgenerateBackupPoms=false

            - name: Change version in jmh project
              working-directory: ${{ github.workspace }}/jmh-benchmarks
              run: |
                  mvn -ntp versions:use-dep-version \
                  -Dincludes=in.co.akshitbansal:spring-web-query-core \
                  -DdepVersion=${{ inputs.version }} \
                  -DforceVersion=true -DgenerateBackupPoms=false

            - name: Commit changes
              run: |
                  git add spring-web-query-core/pom.xml \
                  spring-boot-starter-web-query/pom.xml \
                  jmh-benchmarks/pom.xml
                  
                  git commit -m "Changed versions to ${{ inputs.version }}"

            - name: Push commit and tag
              run: |
                  git push origin release/${{ inputs.version }}
                  git tag -a ${{ inputs.version }} -m "Release ${{ inputs.version }}"
                  git push origin ${{ inputs.version }}

    trivy:
        uses: ./.github/workflows/trivy.yml
        needs: create-release-branch
        name: Trivy
        with:
            target_branch: release/${{ inputs.version }}

    codeql:
        uses: ./.github/workflows/codeql.yml
        needs: create-release-branch
        name: CodeQL
        with:
            target_branch: release/${{ inputs.version }}

    deploy-packages:
        name: Deploy Packages
        needs: create-release-branch
        runs-on: ubuntu-latest
        outputs:
            deployment_id1: ${{ steps.release-core.outputs.deployment_id }}
            deployment_id2: ${{ steps.release-starter.outputs.deployment_id }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: release/${{ inputs.version }}

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven
                  server-id: central
                  server-username: MAVEN_CENTRAL_USERNAME
                  server-password: MAVEN_CENTRAL_PASSWORD
                  gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg-passphrase: GPG_PASSPHRASE

            - name: Release core package
              id: release-core
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: |
                  mvn -B clean deploy -Prelease | tee build.log
                  DEPLOYMENT_ID=$(grep -o 'deploymentId: [a-f0-9-]*' build.log | awk '{print $2}')
                  if [ -z "$DEPLOYMENT_ID" ]; then
                    echo "Failed to extract DEPLOYMENT_ID"
                    exit 1
                  fi
                  echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
              env:
                  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
                  MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                  MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

            - name: Release spring-boot-starter
              id: release-starter
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: |
                  mvn -B clean deploy -Prelease | tee build.log 
                  DEPLOYMENT_ID=$(grep -o 'deploymentId: [a-f0-9-]*' build.log | awk '{print $2}')
                  if [ -z "$DEPLOYMENT_ID" ]; then
                    echo "Failed to extract DEPLOYMENT_ID"
                    exit 1
                  fi
                  echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
              env:
                  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
                  MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                  MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

    version-bump:
        name: Version Bump PR
        needs: deploy-packages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: main

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Set core package version
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -ntp versions:set -DnewVersion=${{ inputs.next-main-version }} -DgenerateBackupPoms=false

            - name: Set starter package version
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: |
                  mvn -ntp versions:set -DnewVersion=${{ inputs.next-main-version }} -DgenerateBackupPoms=false

                  mvn -ntp versions:use-dep-version \
                  -Dincludes=in.co.akshitbansal:spring-web-query-core \
                  -DdepVersion=${{ inputs.next-main-version }} \
                  -DforceVersion=true -DgenerateBackupPoms=false

            - name: Change version in jmh project
              working-directory: ${{ github.workspace }}/jmh-benchmarks
              run: |
                  mvn -ntp versions:use-dep-version \
                  -Dincludes=in.co.akshitbansal:spring-web-query-core \
                  -DdepVersion=${{ inputs.next-main-version }} \
                  -DforceVersion=true -DgenerateBackupPoms=false

            - name: Configure git identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Create PR
              uses: peter-evans/create-pull-request@v8
              with:
                  commit-message: Changed versions to ${{ inputs.next-main-version }} [SKIP CI]
                  branch: version-bump-${{ inputs.next-main-version }}
                  title: Changed versions to ${{ inputs.next-main-version }}
                  body: Automated version changes to ${{ inputs.next-main-version }} post [${{ inputs.version }} release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.version }})
                  labels: automated,post-release
                  author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
                  committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
                  add-paths: |
                      spring-web-query-core/pom.xml
                      spring-boot-starter-web-query/pom.xml
                      jmh-benchmarks/pom.xml

    javadoc-deploy:
        name: Javadoc Deploy
        needs: deploy-packages
        uses: ./.github/workflows/javadoc.yml
        secrets: inherit
        with:
            payload: "{\"deploymentIds\": [\"${{ needs.deploy-packages.outputs.deployment_id1 }}\", \"${{ needs.deploy-packages.outputs.deployment_id2 }}\"]}"