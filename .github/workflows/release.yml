name: Release
on:
  issues:
    types:
      - labeled

jobs:
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    if: github.event.label.name == 'release'
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ steps.parse.outputs.parsed_version }}
      next-main-version: ${{ steps.parse.outputs.parsed_next-main-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: main

      - name: Parse issue body
        id: parse
        uses: issue-ops/parser@cb7e2e4e5da701aad0e23e718bc4c91d442ca8ba # v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: release.yml

      - name: Issue comment
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"

          gh issue comment ${{ github.event.issue.number }} -b "### 🚀 Release workflow initiated
          - **Version**: \`$VERSION\`
          - **Next Main Version**: \`$NEXT_VERSION\`
          - **Logs**: [$RUN_ID]($RUN_URL)"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.parse.outputs.parsed_version }}
          NEXT_VERSION: ${{ steps.parse.outputs.parsed_next-main-version }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b release/${{ steps.parse.outputs.parsed_version }}

      - name: Set core package version
        working-directory: ${{ github.workspace }}/spring-web-query-core
        run: mvn -ntp versions:set -DnewVersion=${{ steps.parse.outputs.parsed_version }} -DgenerateBackupPoms=false

      - name: Set starter package version
        working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
        run: |
          mvn -ntp versions:set -DnewVersion=${{ steps.parse.outputs.parsed_version }} -DgenerateBackupPoms=false

          mvn -ntp versions:use-dep-version \
          -Dincludes=in.co.akshitbansal:spring-web-query-core \
          -DdepVersion=${{ steps.parse.outputs.parsed_version }} \
          -DforceVersion=true -DgenerateBackupPoms=false

      - name: Change version in jmh project
        working-directory: ${{ github.workspace }}/jmh-benchmarks
        run: |
          mvn -ntp versions:use-dep-version \
          -Dincludes=in.co.akshitbansal:spring-web-query-core \
          -DdepVersion=${{ steps.parse.outputs.parsed_version }} \
          -DforceVersion=true -DgenerateBackupPoms=false

      - name: Commit changes
        run: |
          git add spring-web-query-core/pom.xml \
          spring-boot-starter-web-query/pom.xml \
          jmh-benchmarks/pom.xml

          git commit -m "Changed versions to ${{ steps.parse.outputs.parsed_version }}"

      - name: Push commit and tag
        run: |
          git push origin release/${{ steps.parse.outputs.parsed_version }}
          git tag -a ${{ steps.parse.outputs.parsed_version }} -m "Release ${{ steps.parse.outputs.parsed_version }}"
          git push origin ${{ steps.parse.outputs.parsed_version }}

      - name: Release branch comment
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          gh issue comment ${{ github.event.issue.number }} -b "### 🌿 Release branch and tag created
          - **Branch**: [release/$VERSION]($REPO_URL/tree/release/$VERSION)
          - **Tag**: [$VERSION]($REPO_URL/releases/tag/$VERSION)
          "
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.parse.outputs.parsed_version }}

  trivy:
    uses: ./.github/workflows/trivy.yml
    needs: create-release-branch
    name: Trivy
    permissions:
      security-events: write
      contents: read
    with:
      ref: refs/heads/release/${{ needs.create-release-branch.outputs.version }}

  post-trivy-comment:
    name: Trivy Status Comment
    runs-on: ubuntu-latest
    needs:
      - trivy
      - create-release-branch
    permissions:
      issues: write
    steps:
      - name: Issue comment
        run: |
          SECURITY_URL="${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is:open+branch:release/$VERSION"

          gh issue comment ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -b "### 🛡️ Trivy Scan Completed
          The dependency analysis run has completed and results have been uploaded. Review any open findings directly on the [Security Dashboard]($SECURITY_URL).
          "
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.create-release-branch.outputs.version }}

  codeql:
    uses: ./.github/workflows/codeql.yml
    needs: create-release-branch
    name: CodeQL
    permissions:
      security-events: write
      contents: read
    with:
      ref: refs/heads/release/${{ needs.create-release-branch.outputs.version }}

  post-codeql-comment:
    name: CodeQL Status Comment
    runs-on: ubuntu-latest
    needs:
      - codeql
      - create-release-branch
    permissions:
      issues: write
    steps:
      - name: Issue comment
        run: |
          SECURITY_URL="${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is:open+branch:release/$VERSION"

          gh issue comment ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -b "### 🔍 CodeQL Scan Completed
          The semantic analysis run has completed and results have been uploaded. Review any code quality or pattern alerts on the [Security Dashboard]($SECURITY_URL).
          "
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.create-release-branch.outputs.version }}

  deploy-packages:
    name: Deploy Packages
    needs: create-release-branch
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: refs/heads/release/${{ needs.create-release-branch.outputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Release core package
        id: release-core
        working-directory: ${{ github.workspace }}/spring-web-query-core
        run: |
          mvn -B clean deploy -Prelease,boot4
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Release spring-boot-starter
        id: release-starter
        working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
        run: |
          mvn -B clean deploy -Prelease,boot4
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Release branch comment
        run: |
          gh issue comment ${{ github.event.issue.number }} -b "### 📦 Packages published to Maven Central
          ⚠️ **Note:** It can take upto **30 minutes** for the auto-publishing to complete"
        env:
          GH_TOKEN: ${{ github.token }}

  version-bump:
    name: Version Bump PR
    needs: create-release-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set core package version
        working-directory: ${{ github.workspace }}/spring-web-query-core
        run: mvn -ntp versions:set -DnewVersion=${{ needs.create-release-branch.outputs.next-main-version }} -DgenerateBackupPoms=false

      - name: Set starter package version
        working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
        run: |
          mvn -ntp versions:set -DnewVersion=${{ needs.create-release-branch.outputs.next-main-version }} -DgenerateBackupPoms=false

          mvn -ntp versions:use-dep-version \
          -Dincludes=in.co.akshitbansal:spring-web-query-core \
          -DdepVersion=${{ needs.create-release-branch.outputs.next-main-version }} \
          -DforceVersion=true -DgenerateBackupPoms=false

      - name: Change version in jmh project
        working-directory: ${{ github.workspace }}/jmh-benchmarks
        run: |
          mvn -ntp versions:use-dep-version \
          -Dincludes=in.co.akshitbansal:spring-web-query-core \
          -DdepVersion=${{ needs.create-release-branch.outputs.next-main-version }} \
          -DforceVersion=true -DgenerateBackupPoms=false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          commit-message: Changed versions to ${{ needs.create-release-branch.outputs.next-main-version }} [SKIP CI]
          branch: version-bump-${{ needs.create-release-branch.outputs.next-main-version }}
          title: Changed versions to ${{ needs.create-release-branch.outputs.next-main-version }}
          body: Automated version changes to ${{ needs.create-release-branch.outputs.next-main-version }} post [${{ needs.create-release-branch.outputs.version }} release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.create-release-branch.outputs.version }})
          labels: automated,post-release
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          add-paths: |
            spring-web-query-core/pom.xml
            spring-boot-starter-web-query/pom.xml
            jmh-benchmarks/pom.xml

      - name: Close issue
        run: |
          gh issue comment ${{ github.event.issue.number }} \
          -b "### 🔀 Pull request created for next main version: #${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ github.token }}

  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: create-release-branch
    permissions:
      issues: write
      contents: write
    env:
      AGENT_VERSION: 0.1.0
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Download release notes agent jar
        run: |
          curl \
          -u $USERNAME:$TOKEN -L -O \
          https://maven.pkg.github.com/abansal755/release-notes-agent/in/co/akshitbansal/release-notes-agent/$AGENT_VERSION/release-notes-agent-$AGENT_VERSION.jar
        env:
          USERNAME: ${{ vars.GH_PACKAGES_USERNAME }}
          TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Generate release notes
        run: |
          java \
          -Dgoogle-ai-gemini.api-key=$API_KEY \
          -Dgithub.token=$GH_TOKEN \
          -Dinput.repository=${{ github.repository }} \
          -Dinput.version=${{ needs.create-release-branch.outputs.version }} \
          -Doutput.file-path=./notes.md \
          -jar release-notes-agent-$AGENT_VERSION.jar > /dev/null
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}

      - name: Create draft release
        run: |
          gh release create $VERSION \
          -t "Release $VERSION" \
          -F notes.md \
          -R ${{ github.repository }} \
          -d
        env:
          VERSION: ${{ needs.create-release-branch.outputs.version }}
          GH_TOKEN: ${{ github.token }}

      - name: Issue comment
        run: |
          gh issue comment ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -b "### 📝 Draft release created
          The AI-generated release notes are ready for review.
          - **Review and publish**: [Releases](${{ github.server_url }}/${{ github.repository }}/releases)
          "
        env:
          GH_TOKEN: ${{ github.token }}
  
  close-issue:
    name: Close Issue
    runs-on: ubuntu-latest
    needs:
      - post-trivy-comment
      - post-codeql-comment
      - version-bump
      - create-release
    permissions:
      issues: write
    steps:
      - name: Close issue with comment
        run: |
          gh issue close ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -c "### ✅ Release Workflow Completed"
        env:
          GH_TOKEN: ${{ github.token }}
