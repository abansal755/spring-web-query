name: Generate JaCoCo Report

on:
    workflow_call:

jobs:
    jacoco:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

            - name: Set up JDK 17
              uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Run tests for core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B -ntp clean test -Pjacoco,boot4

            - name: Run tests for starter package
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: mvn -B -ntp clean test -Pjacoco,boot4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 #v6.1.1
              with:
                role-to-assume: ${{ vars.AWS_ROLE }}
                role-session-name: github-actions-jacoco-${{ github.run_id }}-${{ github.run_attempt }}
                aws-region: ${{ vars.AWS_REGION }}

            - name: Upload core jacoco report
              working-directory: ${{ github.workspace }}/spring-web-query-core/target/site
              run: |
                  aws s3 cp \
                  jacoco \
                  s3://${{ vars.AWS_S3_BUCKET_NAME}}/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/core \
                  --recursive

                  echo "JaCoCo report for core package is available at: https://builds.akshitbansal.co.in/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/core"

            - name: Upload starter jacoco report
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query/target/site
              run: |
                  aws s3 cp \
                  jacoco \
                  s3://${{ vars.AWS_S3_BUCKET_NAME}}/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/starter \
                  --recursive

                  echo "JaCoCo report for starter package is available at: https://builds.akshitbansal.co.in/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/starter"

            - name: Generate workflow summary
              run: |
                  {
                    echo "## JaCoCo Reports"
                    echo ""
                    echo "| Module | Report |"
                    echo "|---|---|"
                    echo "| spring-web-query-core | [Open Report](https://builds.akshitbansal.co.in/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/core) |"
                    echo "| spring-boot-starter-web-query | [Open Report](https://builds.akshitbansal.co.in/spring-web-query/runs/${{ github.run_id }}/attempts/${{ github.run_attempt}}/jacoco-reports/starter) |"
                  } >> "$GITHUB_STEP_SUMMARY"