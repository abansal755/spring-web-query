name: Trivy Code Scanning

on:
    workflow_call:
        inputs:
            target_branch:
                required: true
                type: string

permissions:
    security-events: write

jobs:
    trivy-code-scanning:
        runs-on: ubuntu-latest
        name: Trivy Code Scanning

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                ref: ${{ inputs.target_branch }}

            - name: Resolve Upload Target
              id: upload-target
              run: |
                echo "ref=refs/heads/${{ inputs.target_branch }}" >> "$GITHUB_OUTPUT"
                echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

            - name: Run Trivy (table output)
              uses: aquasecurity/trivy-action@0.35.0
              with:
                scan-type: 'fs'
                scan-ref: '.'
                severity: CRITICAL,HIGH,MEDIUM
                scanners: vuln,secret
                format: 'table'
              env:
                TRIVY_TABLE_MODE: summary

            - name: Run Trivy (generate SARIF)
              uses: aquasecurity/trivy-action@0.35.0
              with:
                scan-type: 'fs'
                scan-ref: '.'
                severity: CRITICAL,HIGH,MEDIUM
                scanners: vuln,secret
                format: 'sarif'
                output: 'report.sarif'

            - name: Upload results to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v4
              with:
                sarif_file: report.sarif
                category: trivy
                ref: ${{ steps.upload-target.outputs.ref }}
                sha: ${{ steps.upload-target.outputs.sha }}