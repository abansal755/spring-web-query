name: Trivy Code Scanning

on:
    workflow_call:
        inputs:
            target_branch:
                required: true
                type: string
    workflow_dispatch:
        inputs:
            target_branch:
                type: string
                default: main

permissions:
    security-events: write

jobs:
    trivy-code-scanning:
        runs-on: ubuntu-latest
        name: Trivy Code Scanning

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                ref: ${{ inputs.target_branch }}

            - name: Resolve Upload Target
              id: upload-target
              run: |
                echo "ref=refs/heads/${{ inputs.target_branch }}" >> "$GITHUB_OUTPUT"
                echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 17
                  cache: maven

            - name: Build effective pom for core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B -ntp help:effective-pom -Pboot4 -Doutput=tmp/pom.xml

            - name: Run Trivy (table output)
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
              with:
                scan-type: 'fs'
                scan-ref: '.'
                format: 'table'
              env:
                TRIVY_TABLE_MODE: summary

            - name: Run Trivy (generate SARIF)
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
              with:
                scan-type: 'fs'
                scan-ref: '.'
                format: 'sarif'
                output: 'report.sarif'

            - name: Upload results to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v4
              with:
                sarif_file: report.sarif
                category: trivy
                ref: ${{ steps.upload-target.outputs.ref }}
                sha: ${{ steps.upload-target.outputs.sha }}