name: Snapshot Release
on:
    push:
      branches:
        - main
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        if: >-
            ${{ github.event_name != 'push' || !(
              contains(github.event.head_commit.message, 'SKIP CI')
            ) }}
        env:
            AWS_REGION: ${{ vars.AWS_REGION }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
            
            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                distribution: temurin
                java-version: "21"
                cache: maven
                server-id: central
                server-username: MAVEN_CENTRAL_USERNAME
                server-password: MAVEN_CENTRAL_PASSWORD
                gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
                gpg-passphrase: GPG_PASSPHRASE
                
            - name: Release core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B clean deploy -Prelease
              env:
                GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
                MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

            - name: Release spring-boot-starter
              working-directory: ${{ github.workspace }}/spring-boot-starter-web-query
              run: mvn -B clean deploy -Prelease
              env:
                GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
                MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

            - name: Setup AWS Credentials
              run: |
                aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws configure set region $AWS_REGION

            - name: Trigger Lambda Function
              run: |
                aws lambda invoke \
                --function-name cloudflare_javadoc_deploy \
                --log-type Tail \
                --payload '{"deploymentIds": []}' \
                out \
                --cli-binary-format raw-in-base64-out \
                --query 'LogResult' --output text \
                | base64 --decode