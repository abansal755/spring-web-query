name: JMH Benchmarks

on:
    workflow_dispatch:

jobs:
    jmh:
        name: Run JMH Benchmarks
        runs-on: ubuntu-latest
        strategy:
            matrix:
                className:
                    - ReflectiveFieldResolverBenchmark
                    - DTOToEntityPathMapperBenchmark
                    - CachedDTOToEntityPathMapperBenchmark
                    - ListHashingBenchmark
                    - PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams
                    - PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructors
                    - CachedPreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams
        
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

            - name: Set up JDK 17
              uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Build core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B -ntp clean install

            - name: Build JMH Maven Project
              working-directory: ${{ github.workspace }}/jmh-benchmarks
              run: mvn -B -ntp clean verify

            - name: Run Benchmarks
              working-directory: ${{ github.workspace }}/jmh-benchmarks/target
              run: java -jar benchmarks.jar "^.*\.${{ matrix.className }}\..*$" -rf text -rff results.txt

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 #v6.1.1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ vars.AWS_REGION }}

            - name: Upload benchmark results
              working-directory: ${{ github.workspace }}/jmh-benchmarks/target
              run: |
                  aws s3 cp \
                  results.txt \
                  s3://spring-web-query-build-artifacts-444353257799-ap-south-2-an/runs/${{ github.run_id }}/jmh-benchmarks/${{ matrix.className }}.txt

                  echo "Benchmark results for ${{ matrix.className }} are available at: https://builds.akshitbansal.co.in/runs/${{ github.run_id }}/jmh-benchmarks/${{ matrix.className }}.txt"

    summary:
        needs: jmh
        runs-on: ubuntu-latest
        name: Generate Summary
        steps:
            - name: Generate summary
              run: |
                  {
                    echo "# JMH Benchmark Results"
                    echo ""
                    echo "| Benchmark | Result |"
                    echo "|---|---|"

                    benchmarks=(
                      "ReflectiveFieldResolverBenchmark"
                      "DTOToEntityPathMapperBenchmark"
                      "CachedDTOToEntityPathMapperBenchmark"
                      "ListHashingBenchmark"
                      "PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams"
                      "PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructors"
                      "CachedPreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams"
                    )

                    for benchmark in "${benchmarks[@]}"; do
                      echo "| ${benchmark} | [View Result](https://builds.akshitbansal.co.in/runs/${{ github.run_id }}/jmh-benchmarks/${benchmark}.txt) |"
                    done
                  } >> "$GITHUB_STEP_SUMMARY"
