name: JMH Benchmarks

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    jmh:
        name: Run JMH Benchmarks
        runs-on: ubuntu-latest
        if: >-
            ${{
                (github.event_name == 'push' && contains(github.event.head_commit.message, '[BENCHMARK]')) ||
                (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[BENCHMARK]'))
            }}
        strategy:
            matrix:
                className:
                    - ReflectionUtilBenchmark
                    - DTOAwareFieldResolverBenchmark
                    - CachedDTOAwareFieldResolverBenchmark
        
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Build core package
              working-directory: ${{ github.workspace }}/spring-web-query-core
              run: mvn -B -ntp clean install

            - name: Build JMH Maven Project
              working-directory: ${{ github.workspace }}/jmh-benchmarks
              run: mvn -B -ntp clean verify

            - name: Run Benchmarks
              working-directory: ${{ github.workspace }}/jmh-benchmarks/target
              run: java -jar benchmarks.jar ${{ matrix.className }} -rf csv -rff results-${{ matrix.className }}.csv

            - name: Upload JMH Results
              uses: actions/upload-artifact@v7
              with:
                  name: jmh-results-${{ matrix.className }}
                  path: jmh-benchmarks/target/results.csv
