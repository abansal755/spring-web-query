name: JMH Benchmarks

on:
  pull_request:
    types:
      - labeled
  issues:
    types:
      - labeled

jobs:
  in-progress-pr-comment:
    name: In-Progress PR Comment
    permissions:
      pull-requests: write
    if: >-
        github.event_name == 'pull_request' && 
        github.event.action == 'labeled' && 
        contains(github.event.label.name, 'benchmarks')
    runs-on: ubuntu-latest
    steps:
      - name: Comment
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"

          gh pr comment ${{ github.event.pull_request.number }} \
          -R ${{ github.repository }} \
          -b "### 📊 Benchmark workflow triggered
          JMH benchmarks are currently running against this PR. Please wait while performance measurements are collected.
          Check logs: [$RUN_ID]($RUN_URL)"
        env:
          GH_TOKEN: ${{ github.token }}

  in-progress-issue-comment:
    name: In-Progress Issue Comment
    permissions:
      issues: write
    if: >-
        github.event_name == 'issues' && 
        github.event.action == 'labeled' && 
        contains(github.event.label.name, 'benchmarks') 
    runs-on: ubuntu-latest
    steps:
      - name: Comment
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"

          gh issue comment ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -b "### 📊 Benchmark workflow triggered
          JMH benchmarks are currently running. Please wait while performance measurements are collected.
          Check logs: [$RUN_ID]($RUN_URL)"
        env:
          GH_TOKEN: ${{ github.token }}

  jmh:
    name: Run JMH Benchmarks
    runs-on: ubuntu-latest
    needs:
      - in-progress-pr-comment
      - in-progress-issue-comment
    if: >-
      always() &&
      (needs.in-progress-pr-comment.result == 'success' || needs.in-progress-issue-comment.result == 'success')
    permissions:
      pull-requests: write
      issues: write
    strategy:
      matrix:
        className:
          - ReflectiveFieldResolverBenchmark
          - DTOToEntityPathMapperBenchmark
          - CachedDTOToEntityPathMapperBenchmark
          - ListHashingBenchmark
          - PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams
          - PreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructors
          - CachedPreferredConstructorDiscovererBenchmarkWithGrowingNumberOfConstructorParams

    steps:
      - name: Checkout initial code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Parse issue body
        id: parse
        if: github.event_name == 'issues'
        uses: issue-ops/parser@cb7e2e4e5da701aad0e23e718bc4c91d442ca8ba # v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: jmh.yml

      - name: Checkout issue  branch
        if: github.event_name == 'issues'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ steps.parse.outputs.parsed_branch }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build core package
        working-directory: ${{ github.workspace }}/spring-web-query-core
        run: mvn -B -ntp clean install

      - name: Build JMH Maven Project
        working-directory: ${{ github.workspace }}/jmh-benchmarks
        run: mvn -B -ntp clean verify

      - name: Run Benchmarks
        working-directory: ${{ github.workspace }}/jmh-benchmarks/target
        run: java -jar benchmarks.jar "^.*\.${{ matrix.className }}\..*$" -rf json -rff results.json

      - name: Generate summary
        working-directory: ${{ github.workspace }}/jmh-benchmarks/target
        run: |
          {
            echo "# 🚀 ${{ matrix.className }} JMH Benchmarks"
            echo ""
            echo "| Benchmark | Params | Mode | Score | Error | Units |"
            echo "|-----------|--------|------|-------|-------|-------|"

            jq -r '
              .[] |
              "| \(.benchmark) | \(
                  (.params // {})
                  | to_entries
                  | map("\(.key)=\(.value)")
                  | join(", ")
                ) | \(.mode) | \(.primaryMetric.score) | \(.primaryMetric.scoreError // "-") | \(.primaryMetric.scoreUnit) |"
            ' results.json
          } >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Completed PR Comment
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}/jmh-benchmarks/target
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          -F report.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Completed Issue Comment
        if: github.event_name == 'issues'
        working-directory: ${{ github.workspace }}/jmh-benchmarks/target
        run: |
          gh issue comment ${{ github.event.issue.number }} \
          -F report.md
        env:
          GH_TOKEN: ${{ github.token }}

  close-issue:
    name: Close issue
    if: >-
      always() &&
      github.event_name == 'issues' &&
      needs.jmh.result == 'success'
    needs: jmh
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issue with comment
        run: |
          gh issue close ${{ github.event.issue.number }} \
          -R ${{ github.repository }} \
          -c "### ✅ Benchmarking Completed"
        env:
          GH_TOKEN: ${{ github.token }}