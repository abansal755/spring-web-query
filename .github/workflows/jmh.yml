name: JMH Benchmarks

on:
    push:
        branches:
            - main

jobs:
    jmh:
        name: Run JMH Benchmarks
        runs-on: ubuntu-latest
        if: >-
            ${{ contains(github.event.head_commit.message, 'BENCHMARK') }}
        
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Buid JMH Maven Project
              working-directory: ${{ github.workspace }}/jmh-benchmarks
              run: mvn -B -ntp clean verify

            - name: Run Benchmarks
              working-directory: ${{ github.workspace }}/jmh-benchmarks/target
              run: java -jar benchmarks.jar -rf json -rff results.json

            - name: Upload JMH Results
              uses: actions/upload-artifact@v7
              with:
                  name: jmh-results
                  path: jmh-benchmarks/target/results.json
