coverage:
  status:
    project:
      core:
        flags:
          - core
        target: 75%
        threshold: 1%
      starter:
        flags:
          - starter
        target: 75%
        threshold: 1%

flags:
  core:
    paths:
      - spring-web-query-core/**/*.java

  starter:
    paths:
      - spring-boot-starter-web-query/**/*.java

comment:
  layout: "diff, flags, files"